name: Deploy

on:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest ruff httpx

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Test (pytest)
        run: pytest tests/ -v

